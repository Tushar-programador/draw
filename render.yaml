services:
  - type: web
    name: outdraw-backend
    runtime: node
    plan: free
    rootDir: .
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @outdraw/shared build && pnpm --filter @outdraw/server build && pnpm --filter @outdraw/server db:generate
    startCommand: pnpm --filter @outdraw/server start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: SELF_PING_INTERVAL_MS
        value: "300000"
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SELF_PING_URL
        sync: false
